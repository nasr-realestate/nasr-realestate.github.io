<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقييم العقار الذكي | سمسار طلبك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --black: #050505; --glass: rgba(255, 255, 255, 0.03 ); }
        body { background-color: var(--black); background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); color: #fff; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { max-width: 650px; width: 100%; padding: 40px; border-radius: 24px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(214, 175, 55, 0.2); box-shadow: 0 40px 100px rgba(0,0,0,0.8); text-align: center; }
        h1 { color: var(--gold); font-weight: 900; font-size: 2rem; margin-bottom: 5px; }
        p.subtitle { color: #888; margin-bottom: 30px; font-size: 0.95rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: right; }
        .full-width { grid-column: span 2; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-weight: bold; font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: #fff; font-family: 'Cairo'; font-size: 1rem; transition: 0.3s; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; background: rgba(0,0,0,0.7); }
        textarea { resize: none; height: 80px; }
        button#evaluateBtn { width: 100%; padding: 20px; margin-top: 20px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--gold), #b8860b); color: #000; font-weight: 900; font-size: 1.2rem; cursor: pointer; transition: 0.4s; }
        button#evaluateBtn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3); }
        #resultArea { margin-top: 30px; padding: 25px; border-radius: 15px; background: rgba(212, 175, 55, 0.07); border-right: 5px solid var(--gold); text-align: right; line-height: 1.8; display: none; animation: slideUp 0.5s ease; }
        #aiResponse { font-size: 1.1rem; color: #f0f0f0; }
        .whatsapp-btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 15px; margin-top: 20px; background: #25D366; color: #fff; text-decoration: none; border-radius: 12px; font-weight: bold; gap: 10px; transition: 0.3s; }
        .back-home { display: block; margin-top: 25px; color: #666; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-home:hover { color: var(--gold); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <i class="fas fa-microchip" style="color: var(--gold); font-size: 2.5rem; margin-bottom: 15px;"></i>
        <h1>تثمين العقار الذكي</h1>
        <p class="subtitle">حلل قيمة عقارك السوقية بناءً على خوارزميات مدينة نصر والقاهرة الجديدة (أبريل 2026)</p>

        <div class="form-grid">
            <div class="input-group full-width">
                <label>المنطقة أو المربع السكني</label>
                <input list="locations" id="location" placeholder="اكتب اسم الشارع أو المنطقة..">
                <datalist id="locations">
                    <option value="المنطقة الأولى - جولدن سكوير"><option value="المنطقة السادسة - جولدن سكوير"><option value="شارع عباس العقاد الرئيسي"><option value="شارع مكرم عبيد الرئيسي"><option value="حي الواحة - مدينة نصر"><option value="زهراء مدينة نصر"><option value="التجمع الخامس - النرجس"><option value="مصر الجديدة - الميرغني">
                </datalist>
            </div>
            <div class="input-group">
                <label>المساحة (م²)</label>
                <input type="number" id="size" placeholder="مثلاً: 180">
            </div>
            <div class="input-group">
                <label>السعر المطلوب (ج.م)</label>
                <input type="number" id="price" placeholder="مثلاً: 4500000">
            </div>
            <div class="input-group full-width">
                <label>تفاصيل إضافية (الدور، التشطيب، واجهة أم خلفي؟)</label>
                <textarea id="details" placeholder="مثلاً: الدور الرابع، سوبر لوكس، واجهة أمامية، عمارة مرخصة.."></textarea>
            </div>
        </div>

        <button id="evaluateBtn" onclick="startEvaluation()">إجراء الـ Reality Check الآن</button>

        <div id="loading" style="display:none; margin-top: 20px;">
            <i class="fas fa-sync fa-spin" style="color: var(--gold); font-size: 2rem;"></i>
            <p>جاري تحليل بيانات السوق وفحص المربع السكني...</p>
        </div>

        <div id="resultArea">
            <div id="aiResponse" style="white-space: pre-line;"></div>
            <a id="waLink" href="#" class="whatsapp-btn">
                <i class="fab fa-whatsapp"></i> ناقش استراتيجية البيع مع طارق طنطاوي
            </a>
        </div>
        <a href="/" class="back-home"><i class="fas fa-long-arrow-alt-right"></i> العودة للبوابة الرئيسية</a>
    </div>

<script>
async function startEvaluation() {
    const btn = document.getElementById('evaluateBtn');
    const loader = document.getElementById('loading');
    const resArea = document.getElementById('resultArea');
    const responseText = document.getElementById('aiResponse');
    
    const loc = document.getElementById('location').value;
    const size = document.getElementById('size').value;
    const price = document.getElementById('price').value;
    const details = document.getElementById('details').value;

    if(!loc || !size || !price) { alert("من فضلك أكمل البيانات الأساسية"); return; }

    btn.style.display = 'none';
    loader.style.display = 'block';
    resArea.style.display = 'none';

    try {
        const webhookUrl = 'https://eom0v2lymg6py5u.m.pipedream.net'; 
        
        const response = await fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                location: loc,
                size: size,
                price: price,
                details: details
            })
        });

        const data = await response.json();
        
        // التعديل الجوهري هنا لقراءة النص من هيكل Gemini الصحيح
        if (data && data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
            responseText.innerText = data.candidates[0].content.parts[0].text;
        } else {
            responseText.innerText = "اكتمل التحليل، ولكن هناك عطل في عرض النص. يرجى مراجعة المستشار مباشرة.";
        }
        
        const waMsg = `مرحباً أستاذ طارق، حصلت على تقييم لبيانات عقاري في ${loc} وأريد مناقشة التفاصيل.`;
        document.getElementById('waLink').href = `https://wa.me/201147758857?text=${encodeURIComponent(waMsg)}`;
        
        loader.style.display = 'none';
        resArea.style.display = 'block';

    } catch (error) {
        console.error("Error:", error);
        loader.style.display = 'none';
        btn.style.display = 'block';
        alert("المحرك قيد التنشيط، برجاء المحاولة بعد دقيقة.");
    }
}
</script>
</body>
</html>
