<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقييم العقار الذكي | سمسار طلبك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --black: #050505; --glass: rgba(255, 255, 255, 0.03); }
        
        body { 
            background-color: var(--black);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: #fff; font-family: 'Cairo', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; overflow-x: hidden;
        }

        .container { 
            max-width: 600px; width: 90%; margin: 40px auto;
            padding: 40px; border-radius: 24px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(214, 175, 55, 0.2);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center; position: relative;
        }

        h1 { color: var(--gold); font-weight: 900; font-size: 2rem; margin-bottom: 10px; }
        p.subtitle { color: #888; margin-bottom: 30px; font-size: 0.95rem; }

        .input-group { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-weight: bold; font-size: 0.9rem; }

        input, select { 
            width: 100%; padding: 15px; border-radius: 12px;
            border: 1px solid #333; background: rgba(0,0,0,0.5);
            color: #fff; font-family: 'Cairo'; font-size: 1rem;
            transition: 0.3s; box-sizing: border-box;
        }

        input:focus { border-color: var(--gold); outline: none; background: rgba(0,0,0,0.7); }

        button#evaluateBtn { 
            width: 100%; padding: 20px; margin-top: 25px;
            border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: #000; font-weight: 900; font-size: 1.2rem;
            cursor: pointer; transition: 0.4s;
        }

        button#evaluateBtn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3); }

        #resultArea { 
            margin-top: 30px; padding: 25px; border-radius: 15px;
            background: rgba(212, 175, 55, 0.07);
            border-right: 5px solid var(--gold);
            text-align: right; line-height: 1.8;
            display: none; animation: slideUp 0.5s ease;
        }

        .whatsapp-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 100%; padding: 15px; margin-top: 20px;
            background: #25D366; color: #fff; text-decoration: none;
            border-radius: 12px; font-weight: bold; gap: 10px; transition: 0.3s;
        }

        .back-home { display: block; margin-top: 30px; color: #666; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-home:hover { color: var(--gold); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <i class="fas fa-shield-halved" style="color: var(--gold); font-size: 3rem; margin-bottom: 20px;"></i>
        <h1>نظام التقييم الاستراتيجي</h1>
        <p class="subtitle">تحليل واقعي (Reality Check) لأسعار عقارات مدينة نصر والقاهرة الجديدة</p>

        <div class="input-group">
            <label>المنطقة (المربع السكني)</label>
            <select id="location">
                <option value="المنطقة الأولى - مدينة نصر">المنطقة الأولى (جولدن سكوير)</option>
                <option value="المنطقة السادسة - مدينة نصر">المنطقة السادسة (جولدن سكوير)</option>
                <option value="عباس العقاد / مكرم عبيد">عباس العقاد / مكرم عبيد</option>
                <option value="التجمع الخامس / نرجس / لوتس">التجمع الخامس واللوتس</option>
                <option value="مصر الجديدة - هليوبوليس">مصر الجديدة</option>
            </select>
        </div>

        <div class="input-group">
            <label>المساحة (متر مربع)</label>
            <input type="number" id="size" placeholder="مثلاً: 180">
        </div>

        <div class="input-group">
            <label>السعر المطلوب (ج.م)</label>
            <input type="number" id="price" placeholder="مثلاً: 4500000">
        </div>

        <button id="evaluateBtn" onclick="startEvaluation()">تحليل القيمة السوقية الآن</button>

        <div id="loading" style="display:none; margin-top: 20px;">
            <i class="fas fa-circle-notch fa-spin" style="color: var(--gold); font-size: 2rem;"></i>
            <p>جاري استدعاء بيانات السوق والتحليل...</p>
        </div>

        <div id="resultArea">
            <div id="aiResponse"></div>
            <a id="waLink" href="#" class="whatsapp-btn">
                <i class="fab fa-whatsapp"></i> تواصل مع طارق طنطاوي للتنفيذ
            </a>
        </div>

        <a href="/" class="back-home"><i class="fas fa-arrow-right"></i> العودة للبوابة الرئيسية</a>
    </div>

    <script>
        async function startEvaluation() {
            const btn = document.getElementById('evaluateBtn');
            const loader = document.getElementById('loading');
            const resArea = document.getElementById('resultArea');
            const loc = document.getElementById('location').value;
            const size = document.getElementById('size').value;
            const price = document.getElementById('price').value;

            if(!size || !price) { alert("من فضلك أدمل المساحة والسعر"); return; }

            btn.style.display = 'none';
            loader.style.display = 'block';
            resArea.style.display = 'none';

            const prompt = `أنت طارق طنطاوي، مستشار عقاري خبير منذ 2014. قم بإجراء Reality Check لعقار في ${loc}، مساحته ${size}م، وسعره المطلوب ${price} ج.م. إذا كان السعر أعلى من متوسط السوق بـ 15% كن حازماً ووضح أن السعر سيطرد المستثمرين. استخدم لغة احترافية، قوية، ومختصرة. أنهِ الرد بـ "طارق طنطاوي - مستشار استراتيجي".`;

            try {
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyARvu6kQux4Br6OdIN9HdUnzo5NwwMMJfE', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                document.getElementById('aiResponse').innerText = aiText;
                
                // تجهيز رابط واتساب برسالة جاهزة
                const waMsg = `مرحباً أستاذ طارق، قمت بتقييم شقتي في ${loc} عبر الموقع (مساحة ${size}م - سعر ${price}) وأريد مناقشة استراتيجية البيع.`;
                document.getElementById('waLink').href = `https://wa.me/201147758857?text=${encodeURIComponent(waMsg)}`;
                
                loader.style.display = 'none';
                resArea.style.display = 'block';
            } catch (error) {
                alert("عذراً، حدث خطأ في الاتصال بالذكاء الاصطناعي.");
                btn.style.display = 'block';
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
