<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% seo %}

  <meta name="robots" content="index, follow">
  <meta name="author" content="طارق طنطاوي">
  <meta name="theme-color" content="#050505">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

</head>

<body class="{{ page.body_class | default: 'default-page' }}">

  <div class="cinematic-bg"></div>
  <div class="animated-overlay"></div>

  {% include navbar.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- =========================
       Smart Search Button
       ========================= -->
  <div id="smartSearchTrigger" class="smart-search-trigger" onclick="openSmartSearch()">
    <i class="fas fa-hand-sparkles"></i>
    <span>صمم طلبك</span>
  </div>

  <!-- =========================
       Smart Search Overlay
       (نفس الكود بدون تغيير)
       ========================= -->
  <div id="smartSearchOverlay" class="smart-search-overlay">
    <div onclick="closeSmartSearch()"></div>

    <div class="search-card-container">

      <div class="smart-card" id="step1">
        <h2>مرحباً بك</h2>
        <button onclick="nextStep('apartments','تمليك')">تمليك</button>
        <button onclick="nextStep('apartments-rent','إيجار')">إيجار</button>
      </div>

      <div class="smart-card" id="step2">
        <h2>الميزانية</h2>
        <div id="budgetOptions"></div>
      </div>

      <div class="smart-card" id="stepResults">
        <h2>النتائج</h2>
        <div id="resultsContent"></div>
      </div>

    </div>
  </div>

  <!-- =========================
       Call Button
       ========================= -->
  <a href="tel:+201147758857" class="prestige-call-button">
    اتصل الآن
  </a>

  <!-- =========================
       Scripts
       ========================= -->

  <script>
    let allProperties = [];
    let dataLoaded = false;

    async function loadDataIfNeeded() {
      if (dataLoaded) return;
      const res = await fetch("{{ '/search-data.json' | relative_url }}");
      allProperties = await res.json();
      dataLoaded = true;
    }

    function openSmartSearch() {
      loadDataIfNeeded();
      document.getElementById('smartSearchOverlay').style.display = 'flex';
    }

    function closeSmartSearch() {
      document.getElementById('smartSearchOverlay').style.display = 'none';
    }
  </script>

  <!-- =========================
       OneSignal FIXED (FINAL)
       ========================= -->

  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    window.OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "4aa3aed6-b64b-4687-ac67-30232f113da6",
        notifyButton: {
          enable: true
        },
        allowLocalhostAsSecureOrigin: true
      });
    });
  </script>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>

</body>
</html>
