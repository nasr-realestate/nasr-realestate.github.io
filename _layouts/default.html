<body class="{{ page.body_class | default: 'default-page' }}">

  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5BTRF7NP"
            height="0" width="0" style="display:none;visibility:hidden"></iframe>

  <div class="cinematic-bg"></div>
  <div class="animated-overlay"></div>

  {% include navbar.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <div id="smartSearchTrigger" class="smart-search-trigger" onclick="openSmartSearch()">
    <div class="pulse-ring"></div>
    <i class="fas fa-hand-sparkles"></i>
    <span class="trigger-text">صمم طلبك</span>
  </div>

  <div id="smartSearchOverlay" class="smart-search-overlay">
    <div class="overlay-blur" onclick="closeSmartSearch()"></div>
    <div class="search-card-container">
      <div class="smart-card active" id="step1">
        <i class="fas fa-crown gold-icon"></i>
        <h2>بوابة النخبة العقارية</h2>
        <p>نحن لا نبحث عن شقق، نحن نختار لك استثماراً آمناً.. ماذا نطلب اليوم؟</p>
        <div class="choice-grid">
          <button class="choice-btn" onclick="nextStep('apartments', 'تمليك')">تمليك العمر</button>
          <button class="choice-btn" onclick="nextStep('apartments-rent', 'إيجار مفروش')">إيجار فندقي</button>
          <button class="choice-btn" onclick="handleCommercialSelection()">تجاري وإداري</button>
        </div>
        <button class="close-text-btn" onclick="closeSmartSearch()">إغلاق</button>
      </div>
      </div>
  </div>

  <a href="tel:+201147758857" class="call-owner-btn" onclick="trackPhoneCall()">
    <i class="fas fa-phone-alt"></i>
    <span>اتصال بالمستشار</span>
  </a>

  <script>
    function openSmartSearch() { document.getElementById('smartSearchOverlay').style.display = 'flex'; }
    function closeSmartSearch() { document.getElementById('smartSearchOverlay').style.display = 'none'; }
    function trackPhoneCall() { if (typeof dataLayer !== 'undefined') { dataLayer.push({'event': 'phone_call_click'}); } }
    // أضف هنا باقي وظائف الفلترة (setupBudgetOptions, finishSearch) من ملفك الأصلي
  </script>
