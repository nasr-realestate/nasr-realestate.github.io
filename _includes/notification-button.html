<!-- زر تفعيل الإشعارات -->
<div id="notificationToggle" style="position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #1a1a1a, #000); color: #D4AF37; padding: 14px 28px; border-radius: 60px; z-index: 10000; font-family: 'Cairo', sans-serif; font-weight: 600; border: 1px solid #D4AF37; backdrop-filter: blur(10px); cursor: pointer; text-align: center; box-shadow: 0 0 25px rgba(212, 175, 55, 0.3); display: none;">
    🔔 فعّل الإشعارات ليصلك جديد العقارات أولاً بأول
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
  import { getMessaging, getToken, onMessage } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDi8uX4d6jruwmoqmjKp44iEAF4aWsrvpI",
    authDomain: "simsar-talabak.firebaseapp.com",
    projectId: "simsar-talabak",
    storageBucket: "simsar-talabak.appspot.com",
    messagingSenderId: "531743139625",
    appId: "1:367123992147:web:86518a4d46c813d9943444"
  };

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);
  const notifBtn = document.getElementById('notificationToggle');

  // إظهار أو إخفاء الزر حسب حالة الإذن
  if (notifBtn) {
    if (Notification.permission === 'granted' || Notification.permission === 'denied') {
      notifBtn.style.display = 'none';
    } else {
      notifBtn.style.display = 'block';
    }

    notifBtn.onclick = async () => {
      const permission = await Notification.requestPermission();
      if (permission === 'granted') {
        notifBtn.style.display = 'none';
        try {
          const token = await getToken(messaging, { vapidKey: 'YOUR_VAPID_KEY_HERE' });
          if (token) {
            console.log('✅ Token:', token);
            alert('👍 تم تفعيل الإشعارات بنجاح!');
          }
        } catch (err) {
          console.error(err);
          alert('خطأ: ' + err.message);
        }
      } else {
        notifBtn.style.display = 'none';
        alert('⚠️ لم يتم تفعيل الإشعارات.');
      }
    };
  }

  onMessage(messaging, (payload) => {
    if (payload.notification) {
      new Notification(payload.notification.title, {
        body: payload.notification.body,
        icon: 'https://nasr-realestate.github.io/logo.png'
      });
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/firebase-messaging-sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.error('SW error:', err));
  }
</script>
