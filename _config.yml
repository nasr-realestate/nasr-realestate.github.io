title: "سمسار طلبك | طارق طنطاوي"
title_separator: "|"
description: "خبير عقارات مدينة نصر والقاهرة الجديدة منذ 2014. شقق، محلات، ومكاتب بأسعار السوق الواقعية."
url: "https://nasr-realestate.github.io"
baseurl: ""
lang: "ar"
timezone: Africa/Cairo
locale: "ar_EG"
encoding: "UTF-8"

author:
  name: "طارق طنطاوي"
  phone: "+201147758857"
  twitter: "tarekproptech"

contact:
  whatsapp: "+201147758857"
  whatsapp_url: "https://wa.me/201147758857"

logo: "/assets/img/logo.webp"
copyright: "© 2026 سمسار طلبك - طارق طنطاوي. جميع الحقوق محفوظة."

markdown: kramdown
permalink: pretty
kramdown:
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-seo-tag
  - jekyll-feed

google_analytics: "G-CDT8Q9YSJ0"

social:
  image: "/assets/img/social-home.webp"
  type: "website"

collections:
  properties:
    output: true
    permalink: /عقارات-مدينة-نصر/:slug/
  requests:
    output: true
    permalink: /طلبات-عقارية-مستعجلة/:slug/

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      lang: "ar"
      image: "/assets/img/social-home-real.webp"
      author: "طارق طنطاوي"

  - scope:
      path: ""
      type: "properties"
    values:
      layout: "property_page"
      lang: "ar"
      category: "عقارات مدينة نصر"

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - vendor
  - .env*
  - .git
  - .github
