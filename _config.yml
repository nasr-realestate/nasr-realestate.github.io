# ----- 4. هيكلة الـ Collections (توزيع جغرافي) -----
collections:
  properties:
    output: true
    permalink: /عقارات-مدينة-نصر/:slug/
  requests:
    output: true
    permalink: /طلبات-عقارية-مستعجلة/:slug/

# ----- 5. إعدادات الضغط (السرعة = ترتيب أول) -----
sass:
  style: compressed
  
# استثناء الملفات التقنية من الظهور للعامة
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - vendor
  - .env*
  - .git
  
