# ----- 3. هندسة الروابط (SEO Advanced) -----
markdown: kramdown
permalink: pretty
kramdown:
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-gist # اختياري

