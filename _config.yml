# =========================================================
# === ⚙️ سمسار طلبك — الإصدار الاحترافي النهائي 2026 ===
# =========================================================

# ----- 1. المعلومات الأساسية للموقع -----
title: "سمسار طلبك | طارق طنطاوي"
title_separator: "|"
description: "خبير عقارات مدينة نصر والقاهرة الجديدة منذ 2014. شقق، محلات، ومكاتب بأسعار السوق الواقعية."
url: "https://nasr-realestate.github.io"
baseurl: ""
lang: "ar"
timezone: Africa/Cairo
locale: "ar_EG"
encoding: "UTF-8"

# ----- 2. بيانات المالك والتواصل -----
author:
  name: "طارق طنطاوي"
  phone: "+201147758857"
  twitter: "tarekproptech"

contact:
  whatsapp: "+201147758857"
  whatsapp_url: "https://wa.me/201147758857"

logo: "/assets/img/logo.webp"
copyright: "© 2026 سمسار طلبك - طارق طنطاوي. جميع الحقوق محفوظة."

# ----- 3. إعدادات البناء والروابط -----
markdown: kramdown
permalink: pretty
kramdown:
  input: GFM
  hard_wrap: false

# ----- 4. الإضافات (Plugins) -----
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap   # <--- الإضافة المسؤولة عن خريطة الموقع التلقائية

# ----- 5. تحليلات جوجل -----
google_analytics: "G-CDT8Q9YSJ0"

# ----- 6. SEO — صورة المشاركة المحدثة -----
social:
  image: "/assets/img/social-home.webp"
  type: "website"

# ----- 7. Collections — الروابط العربية -----
collections:
  properties:
    output: true
    permalink: /عقارات-مدينة-نصر/:slug/
  requests:
    output: true
    permalink: /طلبات-عقارية-مستعجلة/:slug/

# ----- 8. الإعدادات الافتراضية (Defaults) -----
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      lang: "ar"
      image: "/assets/img/social-home-real.webp"
      author: "طارق طنطاوي"

  - scope:
      path: ""
      type: "properties"
    values:
      layout: "property_page"
      lang: "ar"
      category: "عقارات مدينة نصر"

# ----- 9. إعدادات الأداء والضغط -----
sass:
  style: compressed

# ----- 10. الملفات المستبعدة -----
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - vendor
  - .env*
  - .git
