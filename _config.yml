# --- الربط التقني والأرشفة ---
webmaster_verifications:
  google: "ozxUgrS2657mo8HYSvgjhYSeYv1FCcc8ig_3wjmSoGA"

google_analytics: "G-CDT8Q9YSJ0"

markdown: kramdown
permalink: pretty

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# --- إدارة الروابط (هنا تم إنهاء العربي في الـ URL) ---
collections:
  properties:
    output: true
    permalink: /properties/:slug/
  requests:
    output: true
    permalink: /requests/:slug/

# --- الإعدادات الافتراضية ---
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      lang: "ar"
      image: "/assets/img/social-home.webp"
  - scope:
      path: ""
      type: "properties"
    values:
      layout: "property_page"
  - scope:
      path: ""
      type: "requests"
    values:
      layout: "request_page"

# --- تحسين الأداء والاستثناءات ---
sass:
  style: compressed

keep_files:
  - search-data.json
  - assets/js/firebase-messaging-sw.js

exclude:
  - vendor
  - Gemfile
  - Gemfile.lock
  - .github
  - .jekyll-cache
  - .jekyll-metadata
  - README.md
  - node_modules
  - package.json
  - package-lock.json
  
