# =========================================================
# === ⚙️ سمسار طلبك — إعدادات الموقع (النسخة المُحسَّنة 100%) ===
# === GitHub Pages | Jekyll SEO | Arabic RTL | Cairo Market  ===
# =========================================================


# --------------------------------------------------------
# 1. المعلومات الأساسية للموقع
# ---------------------------------------------------------
title: "سمسار طلبك | شقق للبيع في مدينة نصر"
title_separator: "|"
description: "بوابتك العقارية الأولى في مدينة نصر. تصفح أحدث الشقق والمحلات والمكاتب التجارية للبيع والإيجار."
url: "https://nasr-realestate.github.io"
baseurl: ""
# تنبيه: baseurl فارغة لأن الموقع على custom domain أو root.
# إذا تحول لـ username.github.io/repo — يجب تغييره لـ "/repo-name"
lang: "ar"
timezone: Africa/Cairo
locale: "ar_EG"


# ---------------------------------------------------------
# 2. بيانات المالك والتواصل
# ---------------------------------------------------------
author:
  name: "طارق طنطاوي"
  phone: "+201147758857"
  # البريد محذوف من الـ root لتجنب scrapers — التواصل عبر WhatsApp فقط
  twitter: "tarekproptech"

# WhatsApp هو قناة التواصل الرئيسية
contact:
  whatsapp: "+201147758857"
  whatsapp_url: "https://wa.me/201147758857"

logo: "/assets/img/logo.webp"


# ---------------------------------------------------------
# 3. إعدادات البناء والروابط
# ---------------------------------------------------------
markdown: kramdown
permalink: pretty

kramdown:
  input: GFM
  hard_wrap: false


# ---------------------------------------------------------
# 4. الإضافات (Plugins)
# ---------------------------------------------------------
plugins:
  - jekyll-seo-tag

# تنبيه مهم: jekyll-seo-tag يتولى Google Analytics تلقائياً
# عبر google_analytics أدناه.
# لا تضع كود GA يدوي في الـ layout — سيسبب double tracking.


# ---------------------------------------------------------
# 5. تحليلات جوجل
# ---------------------------------------------------------
google_analytics: "G-8NBQRQ6N10"


# ---------------------------------------------------------
# 6. SEO — الصورة الافتراضية للمشاركة
# ---------------------------------------------------------
# تأكد أن social-home.webp أبعاده 1200×630 بالضبط
# أقل من ذلك: Facebook/WhatsApp لن يعرضها بشكل صحيح
social:
  image: "/assets/img/social-home.webp"


# ---------------------------------------------------------
# 7. Collections — الروابط العربية (SEO عربي مباشر)
# ---------------------------------------------------------
collections:
  properties:
    output: true
    permalink: /شقق-للبيع-في-مدينة-نصر/:slug/
  requests:
    output: true
    permalink: /طلبات-عقارات-مدينة-نصر/:slug/


# ---------------------------------------------------------
# 8. الإعدادات الافتراضية (Defaults)
# ---------------------------------------------------------
defaults:
  # القيم العامة لكل صفحات الموقع
  - scope:
      path: ""
    values:
      layout: "default"
      lang: "ar"
      image: "/assets/img/social-home.webp"
      author: "طارق طنطاوي"

  # صفحات العقارات
  - scope:
      path: ""
      type: "properties"
    values:
      layout: "property_page"
      lang: "ar"
      category: "عقارات مدينة نصر"

  # صفحات الطلبات
  - scope:
      path: ""
      type: "requests"
    values:
      layout: "request_page"
      lang: "ar"
      category: "طلبات عقارية"


# ---------------------------------------------------------
# 9. الملفات المستبعدة من البناء
# ---------------------------------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - vendor
  - "*.sh"
  - "*.bat"
  - .git
  - .gitignore
