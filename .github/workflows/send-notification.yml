name: إرسال إشعار عند إضافة عقار أو طلب جديد

on:
  push:
    branches:
      - master
    paths:
      - '_properties/**'
      - '_requests/**'
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    
    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: تثبيت المكتبات
        run: npm install firebase-admin frontmatter

      - name: إرسال الإشعارات
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node -e '
          const admin = require("firebase-admin");
          const fs = require("fs");
          const { execSync } = require("child_process");
          const frontmatter = require("frontmatter");
          
          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });
          
          const db = admin.firestore();
          
          async function sendNotification() {
            try {
              const output = execSync("git log -1 --name-only --pretty=", { encoding: "utf8" });
              const files = output.split("\n").filter(f =>
                (f.startsWith("_properties/") || f.startsWith("_requests/")) && f.endsWith(".md") && fs.existsSync(f)
              );

              if (files.length === 0) {
                console.log("⚠️ لم يتم العثور على ملفات مستهدفة.");
                return;
              }

              const tokensSnapshot = await db.collection("fcmTokens").get();
              const tokens = [];
              tokensSnapshot.forEach(doc => tokens.push(doc.id));
              
              if (tokens.length === 0) {
                console.log("❌ لا يوجد مستخدمين مسجلين.");
                return;
              }

              for (const filePath of files) {
                const content = fs.readFileSync(filePath, "utf8");
                const { data } = frontmatter(content);
                
                const isRequest = filePath.startsWith("_requests/");
                const title = data.title || (isRequest ? "طلب جديد" : "عقار جديد");
                const price = data.price || data.budget || "";
                const location = data.location || "";
                const slug = data.slug || "";
                
                const baseUrl = "https://nasr-realestate.github.io";
                
                // هندسة الرابط الديناميكي الذكي لمنع الـ 404 نهائياً بناءً على نوع المجلد الفعلي
                const folderFolder = isRequest ? "requests" : "properties";
                const propertyUrl = slug ? `${baseUrl}/${folderFolder}/${slug}/` : baseUrl;

                const message = {
                  data: {
                    title: isRequest ? `🔔 طلب جديد: ${title}` : `🏠 عرض جديد: ${title}`,
                    body: `${price ? "💰 " + price : ""} ${location ? "📍 " + location : ""}`.trim() || "اضغط للتفاصيل",
                    url: propertyUrl
                  },
                  tokens: tokens
                };
                
                const response = await admin.messaging().sendEachForMulticast(message);
                console.log(`✅ تم الإرسال بنجاح للرابط الديناميكي: ${propertyUrl}`);
              }
            } catch (error) {
              console.error("❌ خطأ:", error);
            }
          }
          
          sendNotification();
          '
          
