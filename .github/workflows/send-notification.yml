name: إرسال إشعار عند إضافة عقار جديد

on:
  push:
    branches:
      - main
    paths:
      - '_properties/**'
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    
    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: تثبيت المكتبات
        run: npm install firebase-admin frontmatter
        
      - name: إرسال الإشعارات
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node -e '
          const admin = require("firebase-admin");
          const fs = require("fs");
          const path = require("path");
          const frontmatter = require("frontmatter");
          
          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });
          
          const db = admin.firestore();
          
          // دالة لقراءة بيانات العقار من ملف .md
          function readPropertyData(filePath) {
            try {
              const content = fs.readFileSync(filePath, "utf8");
              const { data, content: body } = frontmatter(content);
              return {
                title: data.title || "عقار جديد",
                price: data.price || "",
                location: data.location || "",
                slug: data.slug || "",
                image: data.image || ""
              };
            } catch (error) {
              console.error(`خطأ في قراءة الملف ${filePath}:`, error);
              return null;
            }
          }
          
          // دالة للحصول على الملفات المضافة حديثاً
          function getNewlyAddedFiles() {
            const { execSync } = require("child_process");
            try {
              const output = execSync("git diff --name-only --diff-filter=A HEAD~1 HEAD", { encoding: "utf8" });
              return output.split("\n").filter(f => f.startsWith("_properties/") && f.endsWith(".md"));
            } catch (error) {
              console.error("خطأ في جلب الملفات المضافة:", error);
              return [];
            }
          }
          
          async function sendNotification() {
            try {
              // جلب جميع التوكنات من Firestore
              const tokensSnapshot = await db.collection("fcmTokens").get();
              const tokens = [];
              tokensSnapshot.forEach(doc => {
                const data = doc.data();
                if (data.token) tokens.push(data.token);
              });
              
              if (tokens.length === 0) {
                console.log("❌ لا توجد توكنات مسجلة");
                return;
              }
              
              // جلب الملفات العقارية المضافة حديثاً
              const newFiles = getNewlyAddedFiles();
              if (newFiles.length === 0) {
                console.log("❌ لا توجد عقارات جديدة");
                return;
              }
              
              // قراءة بيانات أول عقار جديد (للتجربة)
              const propertyData = readPropertyData(newFiles[0]);
              if (!propertyData) {
                console.log("❌ فشل في قراءة بيانات العقار");
                return;
              }
              
              // بناء نص الإشعار من بيانات العقار
              const notificationTitle = `🏠 ${propertyData.title}`;
              let notificationBody = "";
              if (propertyData.price) notificationBody += `💰 ${propertyData.price}`;
              if (propertyData.location) notificationBody += ` 📍 ${propertyData.location}`;
              if (!notificationBody) notificationBody = "تم إضافة عرض جديد، اضغط للمعاينة";
              
              console.log(`📢 جاري إرسال الإشعار إلى ${tokens.length} جهاز`);
              console.log(`📄 بيانات الإشعار: ${notificationTitle} - ${notificationBody}`);
              
              // إنشاء رسالة الإشعار مع الشعار
              const message = {
                notification: {
                  title: notificationTitle,
                  body: notificationBody
                },
                webpush: {
                  notification: {
                    icon: "https://nasr-realestate.github.io/assets/img/logo.webp",
                    badge: "https://nasr-realestate.github.io/assets/img/logo.webp"
                  }
                },
                tokens: tokens
              };
              
              // إرسال الإشعار إلى جميع الأجهزة
              const response = await admin.messaging().sendEachForMulticast(message);
              
              console.log(`✅ تم الإرسال بنجاح إلى ${response.successCount} جهاز`);
              console.log(`❌ فشل الإرسال إلى ${response.failureCount} جهاز`);
              
              // حذف التوكنات الفاشلة (اختياري)
              if (response.failureCount > 0) {
                const failedTokens = [];
                response.responses.forEach((resp, idx) => {
                  if (!resp.success) {
                    failedTokens.push(tokens[idx]);
                  }
                });
                
                for (const failedToken of failedTokens) {
                  await db.collection("fcmTokens").doc(failedToken).delete();
                  console.log(`🗑️ تم حذف التوكن الفاشل: ${failedToken}`);
                }
              }
            } catch (error) {
              console.error("❌ خطأ:", error);
            }
          }
          
          sendNotification();
          '
