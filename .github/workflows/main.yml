name: New Property Notification
on:
  push:
    branches:
      - main

jobs:
  send_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Firebase Notification
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -H "Authorization: key=${{ secrets.FCM_SERVER_KEY }}" \
          -d '{
            "to": "/topics/all",
            "notification": {
              "title": "عقار جديد في سمسار طلبك! 🏠",
              "body": "تم إضافة عرض جديد في مدينة نصر/التجمع، اضغط للمعاينة الآن.",
              "icon": "https://nasr-realestate.github.io/logo.png"
            }
          }' https://fcm.googleapis.com/fcm/send
