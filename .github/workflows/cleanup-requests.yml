name: "Auto-Cleanup Expired Requests"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove Old Requests (Using date in front matter)
        run: |
          echo "🔍 Searching for expired requests..."
          CUTOFF_DATE=$(date -d "7 days ago" +%s)
          FILES_DELETED=false

          for file in _requests/*.md; do
            [ -f "$file" ] || continue
            # استخراج التاريخ من الـ front matter داخل الملف
            FILE_DATE=$(grep "^date:" "$file" | head -1 | sed 's/date: *//; s/ .*//')
            if [ -n "$FILE_DATE" ]; then
              FILE_TIMESTAMP=$(date -d "$FILE_DATE" +%s 2>/dev/null)
              if [ -n "$FILE_TIMESTAMP" ] && [ "$FILE_TIMESTAMP" -lt "$CUTOFF_DATE" ]; then
                echo "🗑️ Deleting: $file (date: $FILE_DATE)"
                git rm "$file"
                FILES_DELETED=true
              fi
            fi
          done

          if [ "$FILES_DELETED" = true ]; then
            echo "✅ Expired requests deleted."
          else
            echo "ℹ️ No expired requests found today."
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Simsar Talabak Bot"
          git config --global user.email "bot@nasr-realestate.com"
          if ! git diff-index --quiet HEAD; then
            git commit -m "System: Auto-cleanup of expired requests (7-day rule from front matter)"
            git push origin master
          else
            echo "ℹ️ No changes to commit."
          fi
